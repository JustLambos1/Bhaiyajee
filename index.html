<!DOCTYPE html>
<html>
<head>
    <title>Redeem Codes</title>
    <style>
        body {
            background-color: #8B5A2B;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
        }
        h1 { color: gold; }
        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: green;
            color: white;
            cursor: pointer;
        }
        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎁 Redeem Codes 🎁</h1>
        <input type="text" id="codeInput" placeholder="Enter code here">
        <br><br>
        <button onclick="claimCode()">Claim</button>
        <div id="result"></div>
    </div>

    <script>
        function claimCode() {
            let code = document.getElementById("codeInput").value.trim().toUpperCase();
            if (code === "HATCH") {
                document.getElementById("result").innerHTML = "✅ Claimed";
            } else {
                document.getElementById("result").innerHTML = "❌ Invalid Code";
            }
        }
    </script>
</body>
</html>
